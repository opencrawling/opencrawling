spring:
  application:
    name: opencrawling

  datasource:
    url: jdbc:h2:mem:opencrawling;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: redis_password

  ai:
    # ── Copilot engine: 'ollama' (default) or 'openai'
    copilot:
      engine: ollama
    # OpenAI autoconfiguration is OFF by default in dev profile.
    # Set OPENAI_API_KEY env var and spring.ai.openai.enabled=true to activate.
    openai:
      enabled: false
      api-key: ${OPENAI_API_KEY:disabled}
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_CHAT_MODEL:llama3.2}
      embedding:
        options:
          model: mxbai-embed-large
    vectorstore:
      pgvector:
        url: jdbc:postgresql://127.0.0.1:5432/opencrawling
        username: opencrawling
        password: opencrawling_password
        initialize-schema: true
        dimensions: 1024
    mcp:
      server:
        name: "opencrawling-secure-vector-mcp"
        version: "1.0.0"
        transport: STREAMABLE_HTTP
        annotation-scanner:
          enabled: true

  batch:
    jdbc:
      initialize-schema: always

  threads:
    virtual:
      enabled: true

  opencrawling:
    claim-check:
      store: ${SPRING_OPENCRAWLING_CLAIM_CHECK_STORE:local}
      cleanup-on-consume: true
      local:
        dir: ${SPRING_OPENCRAWLING_CLAIM_CHECK_LOCAL_DIR:target/claims}
      ozone:
        s3-endpoint: ${SPRING_OPENCRAWLING_CLAIM_CHECK_OZONE_S3_ENDPOINT:http://localhost:9878}
        volume: ${SPRING_OPENCRAWLING_CLAIM_CHECK_OZONE_VOLUME:s3v}
        bucket: ${SPRING_OPENCRAWLING_CLAIM_CHECK_OZONE_BUCKET:claims}
        access-key: ${OZONE_ACCESS_KEY_ID:ozone}
        secret-key: ${OZONE_SECRET_ACCESS_KEY:ozone-secret}
        path-style-access: true
        region: us-east-1
        auto-create-bucket: true

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: opencrawling-vector-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.opencrawling.runtime.messaging"

server:
  port: 8080

logging:
  level:
    root: INFO
    org.opencrawling: DEBUG
    org.springframework: INFO
    org.apache.kafka: WARN
    org.hibernate: WARN
