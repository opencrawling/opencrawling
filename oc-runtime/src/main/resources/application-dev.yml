spring:
  application:
    name: opencrawling

  datasource:
    url: jdbc:h2:mem:opencrawling;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: redis_password

  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      embedding:
        options:
          model: mxbai-embed-large
    vectorstore:
      pgvector:
        url: jdbc:postgresql://127.0.0.1:5432/opencrawling
        username: opencrawling
        password: opencrawling_password
        initialize-schema: true
        dimensions: 1024

  batch:
    jdbc:
      initialize-schema: always

  threads:
    virtual:
      enabled: true

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: opencrawling-vector-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.opencrawling.runtime.messaging"

server:
  port: 8080

logging:
  level:
    root: INFO
    org.opencrawling: DEBUG
    org.springframework: INFO
    org.apache.kafka: WARN
    org.hibernate: WARN
